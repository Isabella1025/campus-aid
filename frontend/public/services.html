<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CampusAid - Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .service-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
        }

        .loading {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            color: #7f8c8d;
            font-size: 18px;
        }

        .empty-state {
            background: white;
            padding: 60px 30px;
            border-radius: 15px;
            text-align: center;
            color: #7f8c8d;
        }

        .empty-state h2 {
            color: #34495e;
            margin-bottom: 10px;
        }

        .action-btn {
            display: inline-block;
            width: 100%;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-bottom: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎓 CampusAid - Student Services</h1>
            <div class="user-info">
                <div id="userInfoDisplay"></div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading">
            Loading services...
        </div>

        <!-- Services Grid -->
        <div id="servicesGrid" class="services-grid" style="display: none;"></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>No Services Available</h2>
            <p>Please contact your administrator.</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        const serviceConfig = {
            'CAREER': { icon: '💼', color: '#3498db' },
            'ADVISING': { icon: '📚', color: '#e74c3c' },
            'ODIP': { icon: '🌍', color: '#27ae60' }
        };

        // Check authentication
        function checkAuth() {
            const user = sessionStorage.getItem('user');
            if (!user) {
                window.location.href = '/';
                return null;
            }
            return JSON.parse(user);
        }

        // Display user info with role-based quick links
        function displayUserInfo(user) {
            const userInfoDiv = document.getElementById('userInfoDisplay');
            
            let quickLinks = '';
            
            if (user.role === 'service_admin') {
                quickLinks = `
                    <div style="margin-top: 8px;">
                        <a href="/staff-approvals.html" style="
                            display: inline-block;
                            padding: 6px 14px;
                            background: #667eea;
                            color: white;
                            text-decoration: none;
                            border-radius: 6px;
                            font-size: 13px;
                            font-weight: 600;
                            margin-right: 8px;
                        ">👥 Staff Approvals</a>
                    </div>
                `;
            }
            
            userInfoDiv.innerHTML = `
                <div style="text-align: right;">
                    <div style="font-weight: 600; color: #2c3e50; font-size: 15px;">
                        ${user.full_name || user.email || user.student_id}
                    </div>
                    <div style="font-size: 13px; color: #7f8c8d; text-transform: capitalize;">
                        ${user.role || 'student'}
                    </div>
                    ${quickLinks}
                </div>
            `;
        }

        // Load services
        async function loadServices() {
            try {
                const user = checkAuth();
                if (!user) return;

                displayUserInfo(user);

                // Fetch services
                const servicesResponse = await fetch(`${API_BASE}/services`, {
                    credentials: 'include'
                });

                if (!servicesResponse.ok) {
                    throw new Error('Failed to load services');
                }

                const servicesData = await servicesResponse.json();
                let services = servicesData.data || [];

                // FILTER BASED ON ROLE
                if (user.role === 'staff') {
                    // Staff only see their assigned service
                    if (user.assigned_service_id) {
                        services = services.filter(s => s.id === user.assigned_service_id);
                    } else {
                        services = [];
                    }
                }
                // Service admin and students see all services

                // Fetch channels
                const channelsResponse = await fetch(`${API_BASE}/channels`, {
                    credentials: 'include'
                });

                const channelsData = await channelsResponse.json();
                const channels = channelsData.data || [];

                // Group channels by service
                const channelsByService = {};
                channels.forEach(channel => {
                    if (!channelsByService[channel.service_id]) {
                        channelsByService[channel.service_id] = [];
                    }
                    channelsByService[channel.service_id].push(channel);
                });

                document.getElementById('loadingState').style.display = 'none';

                if (services.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    if (user.role === 'staff') {
                        document.querySelector('.empty-state h2').textContent = 'No Service Assigned';
                        document.querySelector('.empty-state p').textContent = 'Contact your administrator to assign you to a service.';
                    }
                    return;
                }

                // Display services
                const servicesGrid = document.getElementById('servicesGrid');
                servicesGrid.style.display = 'grid';

                services.forEach(service => {
                    const config = serviceConfig[service.service_code] || 
                                   { icon: '📋', color: '#95a5a6' };
                    
                    const serviceChannels = channelsByService[service.id] || [];
                    
                    const card = document.createElement('div');
                    card.className = 'service-card';
                    card.style.borderLeft = `5px solid ${config.color}`;
                    
                    // Build action buttons based on role
                    let actionButtons = '';
                    
                    if (user.role === 'staff' || user.role === 'service_admin') {
                        // STAFF VIEW: Admin buttons only
                        actionButtons = `
                            <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #ecf0f1;">
                                <a href="/admin.html?service=${service.id}" class="action-btn" style="
                                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                                    color: white;
                                ">⚙️ Service Admin Dashboard</a>
                                
                                <a href="/staff-dashboard.html" class="action-btn" style="
                                    background: #28a745;
                                    color: white;
                                ">📅 Manage Appointments</a>
                            </div>
                        `;
                    } else {
                        // STUDENT VIEW: Book appointment button
                        actionButtons = `
                            <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #ecf0f1;">
                                <a href="/appointments.html?service=${service.id}" class="action-btn" style="
                                    background: #28a745;
                                    color: white;
                                ">📅 Book Appointment</a>
                            </div>
                        `;
                    }
                    
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 15px; text-align: center;">
                            ${config.icon}
                        </div>
                        <h2 style="color: #2c3e50; margin-bottom: 10px; font-size: 22px; text-align: center;">
                            ${service.service_name}
                        </h2>
                        <p style="color: #7f8c8d; margin-bottom: 20px; line-height: 1.6; text-align: center;">
                            ${service.service_description || 'No description available'}
                        </p>
                        
                        ${serviceChannels.length > 0 ? `
                            <div>
                                <h3 style="color: #34495e; font-size: 16px; margin-bottom: 12px;">
                                    Available Channels:
                                </h3>
                                ${serviceChannels.map(channel => `
                                    <div style="
                                        display: flex;
                                        justify-content: space-between;
                                        align-items: center;
                                        padding: 10px;
                                        background: #f8f9fa;
                                        border-radius: 6px;
                                        margin-bottom: 8px;
                                    ">
                                        <span style="color: #2c3e50; font-weight: 500;">
                                            ${channel.channel_name}
                                        </span>
                                        <a href="/chat.html?channel=${channel.id}" style="
                                            background: ${config.color};
                                            color: white;
                                            padding: 6px 16px;
                                            border-radius: 20px;
                                            text-decoration: none;
                                            font-size: 13px;
                                            font-weight: 600;
                                        ">Chat</a>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <p style="color: #95a5a6; font-style: italic; font-size: 14px; text-align: center;">
                                No channels available yet
                            </p>
                        `}
                        
                        ${actionButtons}
                    `;
                    
                    servicesGrid.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading services:', error);
                document.getElementById('loadingState').style.display = 'none';
                alert('Failed to load services. Please try again.');
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                console.error('Logout error:', error);
            }
            sessionStorage.clear();
            window.location.href = '/';
        });

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadServices);
    </script>
</body>
</html>
